<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MOS — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="agent-os.css" />
<style>
  .page{padding:18px 24px 30px;display:flex;flex-direction:column;gap:16px;min-height:calc(100vh - 48px)}

  /* ------- page header ------- */
  .ph{display:flex;align-items:flex-end;gap:18px;flex-wrap:wrap}
  .ph h1{margin:0;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-faint);font-weight:600;font-family:'JetBrains Mono',monospace}
  .ph .big{margin-top:4px;font-size:24px;font-weight:600;letter-spacing:-0.01em;color:var(--text)}
  .ph .sub{color:var(--text-faint);font-size:12px;margin-top:5px}
  .ph .sub b{color:var(--text);font-family:'JetBrains Mono',monospace;font-weight:500}
  .ph .right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .seg{display:inline-flex;background:var(--bg-elev);border:1px solid var(--line-strong);border-radius:7px;padding:2px;gap:0}
  .seg button{appearance:none;border:0;background:transparent;color:var(--text-dim);
    height:24px;padding:0 12px;font-size:11.5px;border-radius:5px;cursor:default;font-family:'JetBrains Mono',monospace}
  .seg button:hover{color:var(--text)}
  .seg button.on{background:var(--bg-elev-3);color:var(--text)}
  .live-pill{display:inline-flex;align-items:center;gap:6px;height:26px;padding:0 10px;border:1px solid var(--line-strong);border-radius:6px;
    font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
  .live-pill .d{width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok);animation:os-pulse 1.6s ease-in-out infinite}

  /* ------- KPI strip ------- */
  .kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  .kpi{background:var(--bg-elev);border:1px solid var(--line);border-radius:11px;padding:13px 15px;display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden}
  .kpi .k{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-faint);font-family:'JetBrains Mono',monospace}
  .kpi .v{font-size:22px;font-family:'JetBrains Mono',monospace;color:var(--text);letter-spacing:-0.01em;font-variant-numeric:tabular-nums;line-height:1.1;font-weight:500}
  .kpi .v .u{font-size:12px;color:var(--text-faint);margin-left:2px}
  .kpi .d{font-size:11px;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:6px}
  .kpi .d .ok{color:var(--ok)}
  .kpi .d .warn{color:var(--warn)}
  .kpi .d .down{color:var(--err)}
  .kpi .d .label{color:var(--text-faint)}
  .kpi.accent{border-color:var(--accent-line);background:linear-gradient(180deg, rgba(224,122,95,0.06), var(--bg-elev) 60%)}
  .kpi .mini-spark{position:absolute;right:14px;top:14px;height:30px;display:flex;align-items:flex-end;gap:2px}
  .kpi .mini-spark span{width:2px;background:var(--text-faint);border-radius:1px;opacity:0.6}
  .kpi.accent .mini-spark span{background:var(--accent);opacity:0.9}

  /* ------- card primitives ------- */
  .card{background:var(--bg-elev);border:1px solid var(--line);border-radius:12px;display:flex;flex-direction:column;overflow:hidden}
  .card-hd{padding:13px 16px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line)}
  .card-hd .t{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-faint);font-weight:600;font-family:'JetBrains Mono',monospace}
  .card-hd .h{font-size:14px;color:var(--text);font-weight:500;margin-top:2px}
  .card-hd .right{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-faint);font-family:'JetBrains Mono',monospace}
  .card-bd{flex:1;padding:14px 16px}

  /* row layouts */
  .row-2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
  .row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
  .row-mix{display:grid;grid-template-columns:1.1fr 1.1fr 1fr;gap:16px}

  /* ------- spend chart ------- */
  .spend-legend{display:flex;align-items:center;gap:14px;font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
  .spend-legend .li{display:inline-flex;align-items:center;gap:6px}
  .spend-legend .sw{width:10px;height:10px;border-radius:2px}

  /* ------- radar ------- */
  .radar-wrap{display:flex;align-items:center;gap:20px}
  .radar-svg{flex:1}
  .radar-leg{flex:0 0 160px;display:flex;flex-direction:column;gap:8px}
  .radar-leg .li{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
  .radar-leg .li .g{width:20px;height:20px;border-radius:5px;background:var(--bg);border:1px solid var(--line-strong);
    display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--text);font-size:11px}
  .radar-leg .li .nm{color:var(--text);font-size:11.5px}
  .radar-leg .li .v{margin-left:auto;color:var(--accent);font-variant-numeric:tabular-nums}

  /* ------- skills bars ------- */
  .bar-list{display:flex;flex-direction:column;gap:9px}
  .br-row{display:flex;flex-direction:column;gap:4px}
  .br-row .top{display:flex;align-items:baseline;gap:8px;font-size:12px}
  .br-row .nm{color:var(--text);font-family:'JetBrains Mono',monospace}
  .br-row .nm .sl{color:var(--accent)}
  .br-row .ct{margin-left:auto;color:var(--text-faint);font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
  .br-row .bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;position:relative}
  .br-row .bar > i{display:block;height:100%;background:linear-gradient(90deg, var(--accent), var(--accent-hover));border-radius:3px}
  .br-row.alt .bar > i{background:linear-gradient(90deg, #7ec5ff, #5aa7e6)}

  /* ------- traces table ------- */
  .traces{display:flex;flex-direction:column;gap:1px;background:var(--line);border-radius:8px;overflow:hidden;border:1px solid var(--line)}
  .tr-row{display:grid;grid-template-columns:90px 24px 1fr 60px 60px 80px;gap:10px;padding:9px 12px;background:var(--bg-elev);align-items:center;font-size:11.5px}
  .tr-row.head{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-faint);font-family:'JetBrains Mono',monospace;background:var(--bg-elev-2)}
  .tr-row .id{font-family:'JetBrains Mono',monospace;color:var(--text-dim)}
  .tr-row .g{width:22px;height:22px;border-radius:5px;background:var(--bg);border:1px solid var(--line-strong);
    display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:11px;color:var(--text)}
  .tr-row .title{color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tr-row .met{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;color:var(--text-dim);text-align:right}
  .tr-row .st{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;text-align:right}
  .tr-row .st.ok{color:var(--ok)} .tr-row .st.run{color:var(--info)} .tr-row .st.err{color:var(--err)} .tr-row .st.warn{color:var(--warn)}

  /* ------- mission funnel ------- */
  .funnel{display:flex;flex-direction:column;gap:8px}
  .fn-row{display:grid;grid-template-columns:84px 1fr 48px;gap:10px;align-items:center;font-size:12px}
  .fn-row .lbl{font-family:'JetBrains Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-faint)}
  .fn-row .track{height:18px;background:var(--bg);border-radius:4px;overflow:hidden;border:1px solid var(--line);position:relative}
  .fn-row .track > i{display:block;height:100%;background:var(--bg-elev-3);border-radius:3px;display:flex;align-items:center;padding:0 10px;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text)}
  .fn-row.ok    .track > i{background:linear-gradient(90deg, rgba(139,227,139,0.5), rgba(139,227,139,0.3))}
  .fn-row.warn  .track > i{background:linear-gradient(90deg, rgba(230,184,92,0.5), rgba(230,184,92,0.3))}
  .fn-row.err   .track > i{background:linear-gradient(90deg, rgba(226,109,109,0.5), rgba(226,109,109,0.3))}
  .fn-row.queue .track > i{background:var(--bg-elev-3)}
  .fn-row .ct{text-align:right;font-family:'JetBrains Mono',monospace;color:var(--text);font-variant-numeric:tabular-nums}

  /* ------- agent uptime heatmap ------- */
  .heat{display:flex;flex-direction:column;gap:3px}
  .heat-row{display:grid;grid-template-columns:60px repeat(24, 1fr);gap:2px;align-items:center}
  .heat-row.head{margin-bottom:2px}
  .heat-row.head .ag{color:var(--text-faint);font-size:10px;font-family:'JetBrains Mono',monospace}
  .heat-row .ag{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:6px}
  .heat-row .ag .gl{width:16px;height:16px;border-radius:3px;background:var(--bg);border:1px solid var(--line-strong);
    display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:600;color:var(--text)}
  .heat-row .c{height:14px;border-radius:2px;background:var(--bg-elev-3);position:relative}
  .heat-row .hr{font-size:9px;color:var(--text-faint);font-family:'JetBrains Mono',monospace;text-align:center}
  .heat-legend{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:10.5px;color:var(--text-faint);font-family:'JetBrains Mono',monospace}
  .heat-legend .sw{width:14px;height:10px;border-radius:2px}

  /* ------- events stream ------- */
  .events{font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7;color:var(--text-dim);max-height:240px;overflow-y:auto}
  .events .ev{display:grid;grid-template-columns:60px 32px 60px 1fr;gap:8px;padding:1px 0;align-items:start}
  .events .ev .ts{color:var(--text-faint)}
  .events .ev .lv{font-size:9.5px;text-align:center;padding:1px 0;border-radius:2px;letter-spacing:0.04em}
  .events .ev .lv.info{color:var(--info);background:rgba(126,197,255,0.1)}
  .events .ev .lv.ok  {color:var(--ok);  background:var(--ok-soft)}
  .events .ev .lv.warn{color:var(--warn);background:var(--warn-soft)}
  .events .ev .lv.err {color:var(--err); background:var(--err-soft)}
  .events .ev .lv.tool{color:var(--accent);background:var(--accent-soft)}
  .events .ev .who{color:var(--text)}
  .events .ev .msg{color:var(--text-dim)}
  .events .ev .msg b{color:var(--text);font-weight:500}

  /* ------- mini link footer ------- */
  .deep-links{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding-top:10px}
  .deep-links a{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border:1px solid var(--line-strong);border-radius:6px;
    font-size:11px;color:var(--text-dim);text-decoration:none;font-family:'JetBrains Mono',monospace;background:var(--bg-elev)}
  .deep-links a:hover{color:var(--text);border-color:var(--line-bright);background:var(--bg-elev-2)}
  .deep-links a .ar{color:var(--text-faint);transition:transform .12s ease}
  .deep-links a:hover .ar{transform:translateX(2px);color:var(--accent)}

  @media (max-width: 1280px){
    .kpi-row{grid-template-columns:repeat(3,1fr)}
    .row-mix{grid-template-columns:1fr 1fr}
    .row-2{grid-template-columns:1fr}
  }
</style>
</head>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect, useRef } = React;

const AGENTS = [
  { id:"kernel", glyph:"K", role:"orchestrator" },
  { id:"atlas",  glyph:"A", role:"retriever" },
  { id:"loom",   glyph:"L", role:"reasoner" },
  { id:"forge",  glyph:"F", role:"executor" },
  { id:"ledger", glyph:"$", role:"sentinel" },
  { id:"scout",  glyph:"S", role:"retriever" },
  { id:"harbor", glyph:"H", role:"sentinel" },
  { id:"echo",   glyph:"E", role:"scribe" },
];

const TRACES = [
  { id:"run_4f2a91", agent:"forge",  title:"deploy api-gateway → staging",                  tokens:"38.2k", cost:"$0.42", status:"run",  st:"running" },
  { id:"run_4f2a8e", agent:"loom",   title:"draft investor update — week 19",                tokens:"12.6k", cost:"$0.14", status:"ok",   st:"done"  },
  { id:"run_4f2a89", agent:"atlas",  title:"index 124 new docs into knowledge.local",        tokens:"86.4k", cost:"$0.21", status:"ok",   st:"done"  },
  { id:"run_4f2a85", agent:"ledger", title:"reconcile stripe.transactions for april",        tokens:"4.1k",  cost:"$0.05", status:"warn", st:"halted" },
  { id:"run_4f2a82", agent:"scout",  title:"triage inbox · 38 new threads",                  tokens:"7.8k",  cost:"$0.09", status:"ok",   st:"done"  },
  { id:"run_4f2a7f", agent:"harbor", title:"rate-limit · openai · backoff 30s",              tokens:"0.1k",  cost:"$0.00", status:"warn", st:"retry" },
  { id:"run_4f2a7c", agent:"forge",  title:"git pr-create #418 — fix flaky vitest",          tokens:"18.9k", cost:"$0.22", status:"err",  st:"failed" },
  { id:"run_4f2a78", agent:"echo",   title:"transcribe meeting · 2026-05-11 standup",        tokens:"22.1k", cost:"$0.18", status:"ok",   st:"done"  },
];

const FUNNEL = [
  { label:"queued",    n:14, max:200, kind:"queue" },
  { label:"running",   n:6,  max:200, kind:"queue" },
  { label:"done",      n:142,max:200, kind:"ok"    },
  { label:"halted",    n:11, max:200, kind:"warn"  },
  { label:"failed",    n:4,  max:200, kind:"err"   },
];

const SKILLS_TOP = [
  { name:"/budget-cap",        ct:241 },
  { name:"/rate-limit",        ct:182 },
  { name:"/summarize",         ct:87  },
  { name:"/inbox-triage",      ct:62  },
  { name:"/pr-create",         ct:42  },
  { name:"/diff-explain",      ct:18  },
  { name:"/voice-match",       ct:14  },
];

const Icon = ({ k, size=12 }) => {
  const s = { width:size, height:size, display:"inline-block", verticalAlign:"middle" };
  const st = { fill:"none", stroke:"currentColor", strokeWidth:1.5, strokeLinecap:"round", strokeLinejoin:"round" };
  switch(k){
    case "arr": return <svg style={s} viewBox="0 0 16 16" {...st}><path d="M6 4l4 4-4 4"/></svg>;
    case "up":  return <svg style={s} viewBox="0 0 16 16" {...st}><path d="M3 10l5-5 5 5"/></svg>;
    case "down":return <svg style={s} viewBox="0 0 16 16" {...st}><path d="M3 6l5 5 5-5"/></svg>;
    case "filter": return <svg style={s} viewBox="0 0 16 16" {...st}><path d="M2 3h12M4 8h8M6 13h4"/></svg>;
  }
  return null;
};

/* -------------- spend chart (SVG) -------------- */
function SpendChart({ days = 14, height = 200 }){
  const data = useMemo(() => {
    return Array.from({length:days}, (_, i) => {
      const baseAi = 1.1 + Math.sin(i*0.5)*0.4 + (i>9?0.6:0);
      const baseEx = 0.5 + Math.cos(i*0.7)*0.2 + (i===days-2?0.4:0);
      return { d:i, ai:Math.max(0.2, baseAi), ex:Math.max(0.1, baseEx), total:Math.max(0.3, baseAi+baseEx) };
    });
  }, [days]);
  const w = 600;
  const pad = { l: 32, r: 16, t: 18, b: 22 };
  const max = Math.max(...data.map(d => d.total)) * 1.15;
  const x = i => pad.l + (w - pad.l - pad.r) * (i/(data.length-1));
  const y = v => pad.t + (height - pad.t - pad.b) * (1 - v/max);
  const areaPath = (key) => {
    let path = `M ${x(0)} ${y(0)} `;
    data.forEach((d,i) => { path += `L ${x(i)} ${y(d[key])} `; });
    path += `L ${x(data.length-1)} ${y(0)} Z`;
    return path;
  };
  const linePath = (key) => {
    return data.map((d,i) => `${i===0?'M':'L'} ${x(i)} ${y(d[key])}`).join(' ');
  };
  const stackPath = () => {
    let path = `M ${x(0)} ${y(data[0].ai)} `;
    data.forEach((d,i) => { path += `L ${x(i)} ${y(d.ai)} `; });
    for (let i = data.length-1; i >= 0; i--) {
      const d = data[i];
      path += `L ${x(i)} ${y(d.ai + d.ex)} `;
    }
    path += "Z";
    return path;
  };
  const ticks = [0, max/2, max].map(v => Math.round(v*10)/10);
  return (
    <svg viewBox={`0 0 ${w} ${height}`} preserveAspectRatio="none" style={{width:"100%",height,display:"block"}}>
      <defs>
        <linearGradient id="grAi" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stopColor="#E07A5F" stopOpacity="0.45"/>
          <stop offset="100%" stopColor="#E07A5F" stopOpacity="0"/>
        </linearGradient>
        <linearGradient id="grEx" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stopColor="#7ec5ff" stopOpacity="0.35"/>
          <stop offset="100%" stopColor="#7ec5ff" stopOpacity="0"/>
        </linearGradient>
      </defs>
      {ticks.map((t,i) => (
        <g key={i}>
          <line x1={pad.l} x2={w-pad.r} y1={y(t)} y2={y(t)} stroke="rgba(255,255,255,0.05)" strokeDasharray="2 4"/>
          <text x={pad.l-6} y={y(t)+3} fill="rgba(255,255,255,0.3)" fontSize="9" fontFamily="JetBrains Mono" textAnchor="end">${t.toFixed(1)}</text>
        </g>
      ))}
      <path d={stackPath()} fill="url(#grEx)" />
      <path d={areaPath("ai")} fill="url(#grAi)" />
      <path d={linePath("ai")} fill="none" stroke="#E07A5F" strokeWidth="1.6"/>
      {/* the upper edge of the stacked region (ai+ex) */}
      <path d={data.map((d,i) => `${i===0?'M':'L'} ${x(i)} ${y(d.ai + d.ex)}`).join(' ')}
            fill="none" stroke="#7ec5ff" strokeWidth="1.2" strokeOpacity="0.7"/>
      {data.map((d,i) => (i % 2 === 0) && (
        <text key={"x"+i} x={x(i)} y={height-6} fill="rgba(255,255,255,0.3)" fontSize="9" fontFamily="JetBrains Mono" textAnchor="middle">d{i-days+1}</text>
      ))}
      {/* today marker */}
      <line x1={x(data.length-1)} x2={x(data.length-1)} y1={pad.t} y2={height-pad.b} stroke="#E07A5F" strokeWidth="1" strokeDasharray="3 2" opacity="0.6"/>
      <circle cx={x(data.length-1)} cy={y(data[data.length-1].ai)} r="3" fill="#E07A5F"/>
      <text x={x(data.length-1)-4} y={pad.t+10} fill="#E07A5F" fontSize="9" fontFamily="JetBrains Mono" textAnchor="end">today</text>
    </svg>
  );
}

/* -------------- radar (agent utilization) -------------- */
function Radar({ size = 320 }){
  // each agent rated on: cpu, tokens, cost, latency, errors (normalized 0-1)
  const agents = [
    { id:"forge",  c:"#E07A5F", g:"F", vals:[0.85, 0.7,  0.6, 0.55, 0.3] },
    { id:"loom",   c:"#c89cff", g:"L", vals:[0.6,  0.92, 0.78, 0.45, 0.18] },
    { id:"atlas",  c:"#7ec5ff", g:"A", vals:[0.45, 0.55, 0.32, 0.7,  0.1]  },
  ];
  const labels = ["cpu","tokens","cost","latency","errors"];
  const cx = size/2, cy = size/2, r = size/2 - 38;
  const angle = i => (-Math.PI/2) + (i * 2*Math.PI / labels.length);
  const pt = (i, v) => [ cx + Math.cos(angle(i))*r*v, cy + Math.sin(angle(i))*r*v ];
  const rings = [0.25, 0.5, 0.75, 1];
  const polygon = (vals) => vals.map((v,i) => pt(i,v).join(",")).join(" ");
  return (
    <svg viewBox={`0 0 ${size} ${size}`} style={{width:"100%",height:"auto",maxWidth:size}}>
      {rings.map(ring => (
        <polygon key={ring} points={labels.map((_,i) => pt(i, ring).join(",")).join(" ")}
          fill="none" stroke="rgba(255,255,255,0.06)" strokeDasharray={ring===1?"":"2 3"}/>
      ))}
      {labels.map((_,i) => (
        <line key={i} x1={cx} y1={cy} x2={pt(i,1)[0]} y2={pt(i,1)[1]} stroke="rgba(255,255,255,0.05)"/>
      ))}
      {agents.map(a => (
        <g key={a.id}>
          <polygon points={polygon(a.vals)} fill={a.c} fillOpacity="0.1" stroke={a.c} strokeWidth="1.5"/>
          {a.vals.map((v,i) => {
            const [px,py] = pt(i,v);
            return <circle key={i} cx={px} cy={py} r="2.5" fill={a.c}/>;
          })}
        </g>
      ))}
      {labels.map((l,i) => {
        const [lx, ly] = pt(i, 1.18);
        return <text key={l} x={lx} y={ly+3} fill="rgba(255,255,255,0.5)" fontSize="10" fontFamily="JetBrains Mono" textAnchor="middle">{l}</text>;
      })}
    </svg>
  );
}
