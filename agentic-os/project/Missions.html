  .stat .bar{height:4px;border-radius:2px;background:var(--bg);overflow:hidden;border:1px solid var(--line);margin-top:4px}

  .filter .k{color:var(--text-faint)}

  .filter.on{border-color:var(--accent-line);background:var(--accent-soft);color:var(--text)}
  .filter .x{color:var(--text-faint);margin-left:2px;cursor:default}

  .tl-meta .ty{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--text);font-weight:500}
  .tl-meta .ts{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text-faint);margin-left:auto}
  .tl-meta .ds{font-size:11.5px;color:var(--text-dim);line-height:1.45;font-family:'JetBrains Mono',monospace}
  .tl-meta .ds .tag{color:#c89cff}
  .tl-meta .ds .num{color:#f0d3a8}
  .tl-meta .ds .str{color:#a4d984}

  .output-md{padding:0;font-size:13px;line-height:1.65;color:var(--text)}
  .output-md h1,.output-md h2,.output-md h3{margin:12px 0 8px;font-weight:600;letter-spacing:-0.01em}
  .output-md h1{font-size:17px}
  .output-md h2{font-size:14.5px}
  .output-md h3{font-size:13px;color:var(--text-dim);text-transform:none}
  .output-md p{margin:6px 0}
  .output-md ul{margin:6px 0;padding-left:18px}
  .output-md li{margin:2px 0}
  .output-md code{background:rgba(255,255,255,0.07);padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#f0d3a8}
  .output-md pre{background:#0a0a0a;border:1px solid var(--line);border-radius:7px;padding:11px 12px;
    font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.55;overflow-x:auto;margin:8px 0}
  .output-md strong{color:var(--text);font-weight:600}

  /* logs */
  .logs{font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.6;color:var(--text-dim);

  .logs .k{color:#7ec5ff}.logs .s{color:#a4d984}.logs .n{color:#f0d3a8}.logs .c{color:var(--text-faint);font-style:italic}

    case "search": return <svg style={s} viewBox="0 0 20 20" {...stroke}><circle cx="9" cy="9" r="5.5"/><path d="M13 13l3.5 3.5"/></svg>;
    case "x":      return <svg style={s} viewBox="0 0 20 20" {...stroke}><path d="M5 5l10 10M15 5L5 15"/></svg>;
    case "down":   return <svg style={s} viewBox="0 0 10 10" {...stroke}><path d="M2 4l3 3 3-3"/></svg>;
    case "calendar": return <svg style={s} viewBox="0 0 20 20" {...stroke}><rect x="3" y="5" width="14" height="12" rx="1.5"/><path d="M7 3v4M13 3v4M3 9h14"/></svg>;
    case "trend":  return <svg style={s} viewBox="0 0 20 20" {...stroke}><path d="M3 14l5-5 4 4 5-7"/><path d="M13 6h4v4"/></svg>;
    case "doc":    return <svg style={s} viewBox="0 0 20 20" {...stroke}><path d="M5 2.5h7l4 4V17a.5.5 0 01-.5.5h-11A.5.5 0 014 17V3a.5.5 0 01.5-.5z"/><path d="M12 2.5V6h4"/></svg>;
    case "logs":   return <svg style={s} viewBox="0 0 20 20" {...stroke}><path d="M3 6h10M3 10h14M3 14h8"/></svg>;
    case "tl":     return <svg style={s} viewBox="0 0 20 20" {...stroke}><circle cx="5" cy="5" r="2"/><circle cx="5" cy="15" r="2"/><path d="M5 7v6M9 5h7M9 15h4"/></svg>;
    case "export": return <svg style={s} viewBox="0 0 20 20" {...stroke}><path d="M4 13v3a1 1 0 001 1h10a1 1 0 001-1v-3M10 3v10M6 7l4-4 4 4"/></svg>;
  }
  return null;
};

const Status = ({ s }) => {
  const cfg = {
    running:{ cl:"warn",  txt:"running"},
    done:   { cl:"ok",    txt:"done"},
    failed: { cl:"err",   txt:"failed"},
  }[s];
  return <span className={"badge "+cfg.cl}><span className="d"></span>{cfg.txt}</span>;
};

function App() {
  const [sel, setSel] = useState("m_a91");
  const [tab, setTab] = useState("timeline");
  const [filters, setFilters] = useState({ agent:null, status:null, domain:null });
  const [search, setSearch] = useState("");

  const filtered = MISSIONS.filter(m =>
    (!filters.agent  || m.agent  === filters.agent)  &&
    (!filters.status || m.status === filters.status) &&
    (!filters.domain || m.domain === filters.domain) &&
    (!search.trim()  || m.title.toLowerCase().includes(search.toLowerCase()) || m.id.includes(search.toLowerCase()))
  );

  const totals = useMemo(() => {
    const tot = MISSIONS.reduce((s,m) => ({ cost: s.cost + m.cost, tin: s.tin + m.tin, tout: s.tout + m.tout }), {cost:0,tin:0,tout:0});
    const running = MISSIONS.filter(m => m.status === "running").length;
    const failed  = MISSIONS.filter(m => m.status === "failed").length;
    return { ...tot, n: MISSIONS.length, running, failed };
  }, []);

  const mission = MISSIONS.find(m => m.id === sel);
  const detail  = mission ? (DETAIL[mission.id] || defaultDetail(mission)) : null;

  const toggleFilter = (k, v) => setFilters(f => ({...f, [k]: f[k] === v ? null : v }));

  return (
    <div className="page">
      <div className="ph">
        <div className="ph-top">
          <div>
            <h1>Missions</h1>
            <div className="sub">All agent-owned tasks · sorted by start time · last 30 days</div>
          </div>
          <div className="view-switch">
            <a className="on">Table</a>
            <a href="Kanban Board.html">Kanban</a>
            <a>Calendar</a>
          </div>
        </div>
        <div className="stats">
          <div className="stat">
            <div className="k">missions this month</div>
            <div className="v">847</div>
            <div className="delta">▲ 12% vs Apr</div>
          </div>
          <div className="stat">
            <div className="k">total cost · this month</div>
            <div className="v">$48.20</div>
            <div className="bar"><div className="f" style={{width:"38%"}}></div></div>
            <div className="delta" style={{color:"var(--text-faint)"}}>38% of $125 cap</div>
          </div>
          <div className="stat">
            <div className="k">tokens consumed</div>
            <div className="v">12.4M</div>
            <div className="delta">▲ in 9.8M · out 2.6M</div>
          </div>
          <div className="stat">
            <div className="k">success rate · 7d</div>
            <div className="v">94.2%</div>
            <div className="delta warn">▼ −1.4 pp · {totals.failed} failed</div>
          </div>
        </div>
      </div>

      <div className="filters">
        <span className="filter" style={{borderStyle:"dashed",cursor:"default"}}>
          <Icon k="calendar" size={12}/>last 30 days <Icon k="down" size={10}/>
        </span>
        <span className="filter"><span className="k">agent</span>
          <select className="mono" style={{background:"transparent",border:0,color:"var(--text)",fontSize:11.5,outline:"none"}}
                  value={filters.agent || ""} onChange={e=>setFilters(f=>({...f,agent:e.target.value||null}))}>
            <option value="">any</option>
            {Object.keys(AGENTS).map(a => <option key={a} value={a}>{a}</option>)}
          </select>
        </span>
        <span className="filter"><span className="k">status</span>
          <select className="mono" style={{background:"transparent",border:0,color:"var(--text)",fontSize:11.5,outline:"none"}}
                  value={filters.status || ""} onChange={e=>setFilters(f=>({...f,status:e.target.value||null}))}>
            <option value="">any</option>
            <option value="running">running</option>
            <option value="done">done</option>
            <option value="failed">failed</option>
          </select>
        </span>
        <span className="filter"><span className="k">domain</span>
          <select className="mono" style={{background:"transparent",border:0,color:"var(--text)",fontSize:11.5,outline:"none"}}
                  value={filters.domain || ""} onChange={e=>setFilters(f=>({...f,domain:e.target.value||null}))}>
            <option value="">any</option>
            <option value="engineering">engineering</option>
            <option value="writing">writing</option>
            <option value="research">research</option>
            <option value="ops">ops</option>
          </select>
        </span>
        {(filters.agent || filters.status || filters.domain) && (
          <span className="filter on" onClick={()=>setFilters({agent:null,status:null,domain:null})}>
            clear filters <Icon k="x" size={10}/>
          </span>
        )}
        <span className="sep"></span>
        <span style={{fontSize:11.5,color:"var(--text-faint)",fontFamily:"'JetBrains Mono',monospace"}}>{filtered.length} of {MISSIONS.length}</span>
        <div className="search">
          <Icon k="search" />
          <input className="input" placeholder="search title or id…" value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <button className="btn btn-ghost btn-sm"><Icon k="export" size={12}/>Export CSV</button>
      </div>

      <div className={"body" + (mission ? "" : " no-detail")}>
        <div className="tbl-wrap scroll">
          <table className="tbl">
            <thead>
              <tr>
                <th style={{width:90}}>ID</th>
                <th>Title</th>
                <th style={{width:120}}>Agent</th>
                <th style={{width:140}}>Started <span className="sort">▼</span></th>
                <th style={{width:90}}>Duration</th>
                <th className="num" style={{width:80}}>Cost</th>
                <th className="num" style={{width:140}}>Tokens (in/out)</th>
                <th style={{width:90}}>Status</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(m => (
                <tr key={m.id} className={sel===m.id?"on":""} onClick={()=>setSel(m.id)}>
                  <td><span className="id">{m.id}</span></td>
                  <td><span className="title">{m.title}</span><div style={{color:"var(--text-faint)",fontSize:10.5,marginTop:2,fontFamily:"'JetBrains Mono',monospace"}}>{m.domain}</div></td>
                  <td>
                    <span className="ag">
                      <span className="g">{AGENTS[m.agent].glyph}</span>
                      <span className="nm">{m.agent}</span>
                    </span>
                  </td>
                  <td className="mono" style={{fontSize:11.5,color:"var(--text-dim)"}}>{m.start}</td>
                  <td className="mono" style={{fontSize:11.5}}>{m.duration}</td>
                  <td className="num">${m.cost.toFixed(2)}</td>
                  <td className="num">
                    <span className="pill-num">{(m.tin/1000).toFixed(1)}k<span className="sub">/{(m.tout/1000).toFixed(1)}k</span></span>
                  </td>
                  <td><Status s={m.status} /></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {mission && (
          <aside className="detail">
            <div className="detail-hd">
              <div className="top">
                <span className="id">{mission.id}</span>
                <Status s={mission.status} />
                <button className="close" onClick={()=>setSel(null)}><Icon k="x" /></button>
              </div>
              <h2>{mission.title}</h2>
              <div className="detail-meta">
                <span><b style={{fontFamily:"'JetBrains Mono',monospace"}}>{mission.agent}</b> · {mission.domain}</span>
                <span className="mono">started {mission.start}</span>
                <span className="mono">duration {mission.duration}</span>
              </div>
            </div>
            <div className="detail-stats">
              <div className="ds"><span className="k">cost</span><span className="v">${mission.cost.toFixed(2)}</span></div>
              <div className="ds"><span className="k">tokens in</span><span className="v">{(mission.tin/1000).toFixed(1)}k</span></div>
              <div className="ds"><span className="k">tokens out</span><span className="v">{(mission.tout/1000).toFixed(1)}k</span></div>
              <div className="ds"><span className="k">events</span><span className="v">{detail.events.length}</span></div>
            </div>
            <div className="detail-tabs">
              <div className={"t"+(tab==="timeline"?" on":"")} onClick={()=>setTab("timeline")}>
                <Icon k="tl" size={12}/>Timeline <span className="ct">{detail.events.length}</span>
              </div>
              <div className={"t"+(tab==="output"?" on":"")} onClick={()=>setTab("output")}>
                <Icon k="doc" size={12}/>Output
              </div>
              <div className={"t"+(tab==="logs"?" on":"")} onClick={()=>setTab("logs")}>
                <Icon k="logs" size={12}/>Logs <span className="ct">raw</span>
              </div>
            </div>
            <div className="detail-body scroll">
              {tab === "timeline" && (
                <div className="tl">
                  {detail.events.map((ev,i) => (
                    <div key={i} className={"tl-ev "+ev.k}>
                      <div className="node"></div>
                      <div className="tl-meta">
                        <div className="top">
                          <span className="ty">{ev.ty}</span>
                          <span className="ts">{ev.ts}</span>
                        </div>
                        <div className="ds" dangerouslySetInnerHTML={{__html: ev.body}}></div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
              {tab === "output" && <div className="output-md" dangerouslySetInnerHTML={{__html: detail.output}}></div>}
              {tab === "logs"   && <div className="logs" dangerouslySetInnerHTML={{__html: detail.logs}}></div>}
            </div>
          </aside>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
