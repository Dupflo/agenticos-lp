<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MOS — Edit Agent Config</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="agent-os.css" />
<style>
  .layout{display:grid;grid-template-columns:340px 1fr;min-height:calc(100vh - 48px)}

  /* ---- left column: agent list ---- */
  .col-list{border-right:1px solid var(--line);background:var(--bg-elev);
    display:flex;flex-direction:column;min-height:0}
  .list-hd{padding:14px 14px 10px;display:flex;flex-direction:column;gap:10px;
    border-bottom:1px solid var(--line)}
  .list-hd-row{display:flex;align-items:center;justify-content:space-between}
  .list-hd-row h2{margin:0;font-size:13px;font-weight:600;letter-spacing:-0.005em;color:var(--text)}
  .list-hd-row .count{font-size:11px;color:var(--text-faint);font-variant-numeric:tabular-nums}
  .searchbar{position:relative}
  .searchbar input{padding-left:32px}
  .searchbar svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);
    color:var(--text-faint);width:14px;height:14px}
  .new-agent{display:flex;align-items:center;gap:8px;padding:9px 11px;border:1px dashed var(--line-bright);
    border-radius:7px;color:var(--text-dim);font-size:12px;cursor:default}
  .new-agent:hover{color:var(--text);border-color:var(--accent-line);background:rgba(224,122,95,0.04)}
  .new-agent .plus{width:18px;height:18px;border-radius:5px;background:var(--bg-elev-2);
    display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:14px;line-height:1}

  .agent-list{flex:1;overflow-y:auto;padding:8px 8px 16px}
  .a-item{display:flex;align-items:flex-start;gap:11px;padding:10px 10px;border-radius:8px;cursor:default;
    border:1px solid transparent;margin-bottom:2px}
  .a-item:hover{background:var(--bg-elev-2)}
  .a-item.active{background:var(--bg-elev-2);border-color:var(--accent-line);
    box-shadow:0 0 0 1px rgba(224,122,95,0.15)}
  .a-glyph{width:32px;height:32px;border-radius:7px;background:var(--bg);
    border:1px solid var(--line-strong);display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px;color:var(--text);
    flex-shrink:0}
  .a-item.active .a-glyph{color:var(--accent);border-color:var(--accent-line)}
  .a-meta{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
  .a-name-row{display:flex;align-items:center;gap:6px}
  .a-name{font-size:13px;color:var(--text);font-weight:500;
    font-family:'JetBrains Mono',monospace;letter-spacing:-0.005em}
  .a-model{font-size:10.5px;color:var(--text-faint);
    padding:1px 5px;border-radius:3px;background:var(--bg);border:1px solid var(--line);
    font-family:'JetBrains Mono',monospace}
  .a-sub{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-faint)}
  .a-status-dot{width:6px;height:6px;border-radius:50%;background:var(--text-faint)}
  .a-status-dot.ok{background:var(--ok);box-shadow:0 0 6px var(--ok-soft)}
  .a-status-dot.warn{background:var(--warn)}
  .a-status-dot.err{background:var(--err)}
  .a-missions{margin-left:auto;font-variant-numeric:tabular-nums;color:var(--text-muted);font-size:11px}

  /* ---- right column: form ---- */
  .col-edit{display:flex;flex-direction:column;min-width:0;min-height:0}
  .edit-hd{padding:18px 28px 16px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:14px}
  .edit-hd .glyph-lg{width:44px;height:44px;border-radius:10px;background:var(--bg-elev);
    border:1px solid var(--line-strong);display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;font-weight:600;font-size:18px;color:var(--accent)}
  .edit-hd h1{margin:0;font-size:18px;font-weight:600;letter-spacing:-0.01em}
  .edit-hd .breadcrumb{font-size:11.5px;color:var(--text-faint);margin-top:3px;
    display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace}
  .edit-hd .breadcrumb a{color:var(--text-dim);text-decoration:none}
  .edit-hd .breadcrumb a:hover{color:var(--text)}
  .edit-hd-actions{margin-left:auto;display:flex;align-items:center;gap:8px}

  .edit-scroll{flex:1;overflow-y:auto;padding:8px 28px 96px}
  .section{padding:22px 0;border-bottom:1px solid var(--line)}
  .section:last-child{border-bottom:none}
  .section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .section-hd .num{display:inline-flex;width:18px;height:18px;border-radius:4px;
    background:var(--bg-elev-2);border:1px solid var(--line-strong);font-size:10px;
    align-items:center;justify-content:center;color:var(--text-faint);
    font-family:'JetBrains Mono',monospace;margin-right:10px}
  .section-hd-left{display:flex;align-items:center}
  .section-hd-sub{font-size:11.5px;color:var(--text-faint)}

  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

  .picker-input{position:relative;display:flex}
  .picker-input .input{padding-right:38px;font-family:'JetBrains Mono',monospace;font-size:12px}
  .picker-input .pick-btn{position:absolute;right:4px;top:4px;height:calc(100% - 8px);
    width:30px;border:0;background:var(--bg-elev-2);border-radius:5px;color:var(--text-dim);
    cursor:default;display:flex;align-items:center;justify-content:center}
  .picker-input .pick-btn:hover{color:var(--text);background:var(--bg-elev-3)}

  .row-toggle{display:flex;align-items:center;gap:14px;padding:11px 13px;
    background:var(--bg-elev);border:1px solid var(--line);border-radius:8px}
  .row-toggle .rt-text{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
  .row-toggle .rt-text .nm{font-size:13px;color:var(--text);font-weight:500;display:flex;align-items:center;gap:8px}
  .row-toggle .rt-text .nm .ic{width:14px;height:14px;color:var(--text-dim)}
  .row-toggle .rt-text .ds{font-size:11.5px;color:var(--text-faint)}
  .row-toggle .rt-extra{padding:10px 13px 12px;background:var(--bg-elev);
    border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px;font-size:11.5px}
  .row-toggle.with-extra{flex-direction:column;align-items:stretch;padding:0;gap:0}
  .row-toggle.with-extra .rt-main{display:flex;align-items:center;gap:14px;padding:11px 13px}

  /* channels grid */
  .channels{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .channel-card{background:var(--bg-elev);border:1px solid var(--line);border-radius:9px;overflow:hidden;
    transition:border-color .12s ease}
  .channel-card.on{border-color:var(--accent-line);box-shadow:0 0 0 1px rgba(224,122,95,0.1)}
  .channel-hd{padding:11px 13px;display:flex;align-items:center;gap:11px}
  .channel-hd .ch-ic{width:30px;height:30px;border-radius:7px;background:var(--bg);
    border:1px solid var(--line-strong);display:flex;align-items:center;justify-content:center;
    flex-shrink:0;color:var(--text)}
  .channel-card.on .channel-hd .ch-ic{color:var(--accent);border-color:var(--accent-line)}
  .channel-meta{flex:1;min-width:0}
  .channel-name{font-size:13px;color:var(--text);font-weight:500}
  .channel-sub{font-size:11px;color:var(--text-faint);margin-top:2px}
  .channel-body{padding:0 13px 12px;display:flex;flex-direction:column;gap:6px;
    border-top:1px solid var(--line)}
  .channel-body label{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;
    color:var(--text-faint);margin-top:10px}

  /* remote control */
  .remote-card{background:var(--bg-elev);border:1px solid var(--line);border-radius:9px;padding:0;
    transition:border-color .12s ease}
  .remote-card.on{border-color:var(--accent-line)}
  .remote-hd{display:flex;align-items:center;gap:14px;padding:13px 14px}
  .remote-hd .rh-ic{width:34px;height:34px;border-radius:8px;background:var(--bg);
    border:1px solid var(--line-strong);display:flex;align-items:center;justify-content:center;color:var(--text)}
  .remote-card.on .remote-hd .rh-ic{color:var(--accent);border-color:var(--accent-line)}
  .remote-meta{flex:1;min-width:0}
  .remote-meta .nm{font-size:13.5px;color:var(--text);font-weight:500;
    display:flex;align-items:center;gap:8px}
  .remote-meta .ds{font-size:11.5px;color:var(--text-faint);margin-top:2px}
  .remote-body{border-top:1px solid var(--line);padding:14px;display:flex;flex-direction:column;gap:12px}
  .tunnel{display:flex;align-items:center;gap:8px;padding:9px 11px;
    background:var(--bg);border:1px solid var(--line);border-radius:7px;
    font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text)}
  .tunnel .lock{color:var(--ok);width:13px;height:13px;flex-shrink:0}
  .tunnel .url{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tunnel .copy{color:var(--text-faint);cursor:default;width:14px;height:14px}
  .tunnel .copy:hover{color:var(--text)}
  .qr{width:78px;height:78px;background:
    conic-gradient(from 0deg at 50% 50%, var(--bg-elev-3) 0deg, var(--bg) 90deg, var(--bg-elev-3) 180deg, var(--bg) 270deg);
    border:1px solid var(--line-strong);border-radius:6px;
    background-image:
      linear-gradient(45deg, var(--text) 25%, transparent 25%),
      linear-gradient(-45deg, var(--text) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, var(--text) 75%),
      linear-gradient(-45deg, transparent 75%, var(--text) 75%);
    background-size:8px 8px;background-position:0 0,0 4px,4px -4px,-4px 0px;
    opacity:0.95;flex-shrink:0}

  /* tools list (chips) */
  .toolset{display:flex;flex-direction:column;gap:8px}
  .toolset .row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;
    padding:9px;background:var(--bg);border:1px solid var(--line);border-radius:7px;min-height:46px}
  .add-tool{display:inline-flex;align-items:center;gap:5px;height:24px;padding:0 9px;
    background:transparent;border:1px dashed var(--line-bright);border-radius:5px;
    font-size:11.5px;color:var(--text-faint);cursor:default}
  .add-tool:hover{color:var(--text);border-color:var(--accent-line);background:rgba(224,122,95,0.04)}

  /* footer */
  .edit-footer{position:sticky;bottom:0;display:flex;align-items:center;gap:12px;
    padding:14px 28px;
    border-top:1px solid var(--line);
    background:linear-gradient(180deg, rgba(10,10,10,0.6), rgba(10,10,10,0.96) 40%);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
  .save-status{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text-faint)}
  .save-status .d{width:6px;height:6px;border-radius:50%;background:var(--warn)}
  .save-status.saved .d{background:var(--ok)}
  .open-chat{margin-left:auto;display:inline-flex;align-items:center;gap:6px;font-size:12.5px;
    color:var(--accent);text-decoration:none;font-weight:500}
  .open-chat:hover{color:var(--accent-hover)}
  .open-chat svg{width:13px;height:13px}

</style>
</head>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect, useRef } = React;

// ─────── roster ───────
const AGENTS = [
  { id:"kernel",   glyph:"K", name:"kernel",   model:"opus",            status:"ok",   missions:842, role:"orchestrator",

    prompt:"You are the kernel — the root orchestrator of this user's agentic OS.\nRoute requests to capability-matching agents, enforce budget caps, and never speak directly to the user unless they address you by name.\n\n- Prefer delegation over execution.\n- Hold context tightly: summarize before passing to children.\n- Halt any agent that exceeds its budget cap.",

  { id:"atlas",  glyph:"A", name:"atlas",   model:"sonnet", status:"ok",   missions:312, role:"retriever",
    workdir:"~/projects/acme",
    prompt:"You are atlas — the retrieval specialist.\nSearch local indexes first, then web. Cite chunks by id. Never invent sources.",
    permissions:"acceptEdits", allow:["search.local","search.web","embed","fs.read"], deny:["fs.write","shell"], planMax:true,
    channels:{ telegram:{on:false,v:""}, discord:{on:false,v:""}, whatsapp:{on:false,v:""}, webhook:{on:true,v:"https://hooks.acme.dev/atlas"} },

  { id:"loom",  glyph:"L",  name:"loom",   model:"sonnet-thinking", status:"ok",   missions:208, role:"reasoner",

// ─────── icons ───────

    case "chat":    return <svg style={s} viewBox="0 0 20 20" {...stroke}><path d="M3 4h14a1 1 0 011 1v8a1 1 0 01-1 1H8l-3.5 3v-3H3a1 1 0 01-1-1V5a1 1 0 011-1z"/></svg>;
    case "arrow":   return <svg style={s} viewBox="0 0 20 20" {...stroke}><path d="M5 10h10M11 6l4 4-4 4"/></svg>;
    case "plus":    return <svg style={s} viewBox="0 0 20 20" {...stroke}><path d="M10 4v12M4 10h12"/></svg>;
    case "info":    return <svg style={s} viewBox="0 0 20 20" {...stroke}><circle cx="10" cy="10" r="7.5"/><path d="M10 9v5M10 6v.5"/></svg>;
    case "refresh": return <svg style={s} viewBox="0 0 20 20" {...stroke}><path d="M3 10a7 7 0 0112-5l2 2M17 4v3h-3"/><path d="M17 10a7 7 0 01-12 5l-2-2M3 16v-3h3"/></svg>;
    case "telegram":return <svg style={s} viewBox="0 0 20 20" fill="currentColor"><path d="M17.3 3.5L2.5 9.2c-1 .4-1 1 0 1.3l3.7 1.2 1.4 4.5c.2.6.5.8 1 .3l2-2 3.8 2.8c.6.4 1 .2 1.2-.5l2.3-11c.2-.9-.3-1.3-1-.9zm-3.5 4l-6.2 5.7-.2 2.5 1.6-2.5 5.8-5z"/></svg>;
    case "discord": return <svg style={s} viewBox="0 0 20 20" fill="currentColor"><path d="M15.5 5c-1-.5-2.1-.8-3.2-1l-.2.3c1 .2 2 .6 2.8 1.1-1.6-.8-3.5-1.1-5.3-.9-.4 0-.7.1-1.1.2-.5.1-1 .3-1.4.5-.2 0-.3.1-.5.2-1.4.7-2.3 1.6-2.3 1.6S2.8 9.5 2.5 13c0 0 1 1.4 3 1.5l.7-.9c-.9-.3-1.8-.8-2.4-1.4 1.5.9 3.2 1.4 5.1 1.7.4 0 .7.1 1.1.1.4 0 .7 0 1.1-.1 1.9-.3 3.6-.8 5.1-1.7-.7.6-1.5 1.1-2.4 1.4l.7.9c2-.1 3-1.5 3-1.5-.3-3.5-1.8-6-1.8-6zM7.8 11.3c-.6 0-1.2-.6-1.2-1.4 0-.8.5-1.4 1.2-1.4.7 0 1.2.6 1.2 1.4 0 .8-.5 1.4-1.2 1.4zm4.5 0c-.6 0-1.2-.6-1.2-1.4 0-.8.5-1.4 1.2-1.4.7 0 1.2.6 1.2 1.4 0 .8-.5 1.4-1.2 1.4z"/></svg>;
    case "whatsapp":return <svg style={s} viewBox="0 0 20 20" fill="currentColor"><path d="M10 2.5a7.5 7.5 0 00-6.5 11.3L2.5 18l4.3-1.1A7.5 7.5 0 1010 2.5zm0 13.6a6.1 6.1 0 01-3.1-.9l-.2-.1-2.6.7.7-2.5-.1-.2A6.1 6.1 0 1110 16.1zm3.3-4.6c-.2-.1-1-.5-1.2-.6-.2-.1-.3-.1-.5.1l-.7.8c-.1.1-.2.2-.4.1-.2-.1-.9-.3-1.7-1-.6-.6-1.1-1.3-1.2-1.5-.1-.2 0-.3.1-.4l.3-.4c.1-.1.1-.2.2-.3 0-.1 0-.2 0-.4-.1-.1-.5-1.1-.6-1.5-.1-.4-.3-.3-.5-.3h-.4c-.1 0-.3 0-.5.2-.2.2-.7.6-.7 1.6 0 1 .7 1.9.8 2.1.1.1 1.4 2.2 3.5 3 .5.2.9.3 1.2.4.5.2.9.1 1.3.1.4-.1 1-.4 1.2-.8.1-.4.1-.8 0-.8 0-.1-.2-.1-.4-.2z"/></svg>;
    case "webhook": return <svg style={s} viewBox="0 0 20 20" {...stroke}><circle cx="6.5" cy="13.5" r="2"/><circle cx="13.5" cy="13.5" r="2"/><circle cx="10" cy="5" r="2"/><path d="M10 7l-2.5 4.5M10 7l2.5 4.5M8.5 13.5h3"/></svg>;
    case "send":    return <svg style={s} viewBox="0 0 20 20" {...stroke}><path d="M3 10l14-6-5 14-3-6-6-2z"/></svg>;
    case "edit":    return <svg style={s} viewBox="0 0 20 20" {...stroke}><path d="M13 4l3 3-9 9H4v-3l9-9z"/></svg>;
  }
  return null;
};

// ─────── components ───────
function AgentList({ agents, selected, onSelect, query, setQuery }) {
  const filtered = agents.filter(a =>
    !query.trim() ||
    a.name.includes(query.toLowerCase()) ||
    a.role.includes(query.toLowerCase()));
  return (
    <aside className="col-list">
      <div className="list-hd">
        <div className="list-hd-row">
          <h2>Agents</h2>
          <span className="count mono">{agents.length} configured</span>
        </div>
        <div className="searchbar">
          <Icon k="search" />
          <input className="input" placeholder="Search agents, roles, tools…"
                 value={query} onChange={e => setQuery(e.target.value)} />
        </div>
        <div className="new-agent">
          <span className="plus">+</span>
          <span>Spawn new agent</span>
          <span style={{marginLeft:"auto",fontSize:10.5,color:"var(--text-faint)"}} className="mono">⌘ N</span>
        </div>
      </div>
      <div className="agent-list scroll">
        {filtered.map(a => (
          <div key={a.id} className={"a-item" + (selected === a.id ? " active" : "")}
               onClick={() => onSelect(a.id)}>
            <div className="a-glyph">{a.glyph}</div>
            <div className="a-meta">
              <div className="a-name-row">
                <span className="a-name">{a.name}</span>
                <span className="a-model">{a.model}</span>
              </div>
              <div className="a-sub">
                <span className={"a-status-dot " + a.status}></span>
                <span style={{textTransform:"capitalize"}}>{a.role}</span>
                <span className="a-missions mono">{a.missions.toLocaleString()} missions</span>
              </div>
            </div>
          </div>
        ))}
      </div>
    </aside>
  );
}

function Toggle({ on, onChange }) {
  return <div className={"toggle" + (on ? " on" : "")} onClick={() => onChange(!on)}>
    <div className="knob"></div>
  </div>;
}

function RadioGroup({ value, options, onChange }) {
  return (
    <div className="radio-group">
      {options.map(o =>
        <div key={o} className={"opt" + (value === o ? " on" : "")} onClick={() => onChange(o)}>{o}</div>)}
    </div>
  );
}

function ChipList({ items, kind, onRemove, onAdd }) {
  const [adding, setAdding] = useState(false);
  const [val, setVal] = useState("");
  return (
    <div className="row">
      {items.map(t => (
        <span key={t} className={"chip mono " + kind}>
          {t}<span className="x" onClick={() => onRemove(t)}>×</span>
        </span>
      ))}
      {adding
        ? <input autoFocus className="input" style={{height:24,padding:"0 8px",width:140,fontSize:11.5}}
            value={val} onChange={e=>setVal(e.target.value)}
            onBlur={()=>{ if(val.trim()) onAdd(val.trim()); setAdding(false); setVal(""); }}
            onKeyDown={e=>{
              if(e.key==="Enter" && val.trim()){ onAdd(val.trim()); setAdding(false); setVal(""); }
              if(e.key==="Escape"){ setAdding(false); setVal(""); }
            }} />
        : <button className="add-tool" onClick={()=>setAdding(true)}><Icon k="plus" size={11} />add</button>
      }
    </div>
  );
}

function ChannelCard({ id, name, sub, icon, on, value, valueLabel, valuePh, onToggle, onValue }) {
  return (
    <div className={"channel-card" + (on ? " on" : "")}>
      <div className="channel-hd">
        <div className="ch-ic"><Icon k={icon} size={16} /></div>
        <div className="channel-meta">
          <div className="channel-name">{name}</div>
          <div className="channel-sub">{sub}</div>
        </div>
        <Toggle on={on} onChange={onToggle} />
      </div>
      {on && (
        <div className="channel-body">
          <label>{valueLabel}</label>
          <input className="input mono" style={{fontSize:11.5}} value={value}
                 placeholder={valuePh} onChange={e => onValue(e.target.value)} />
        </div>
      )}
    </div>
  );
}

function App() {
  const [agents, setAgents] = useState(AGENTS);
  const [selId, setSelId] = useState("kernel");
  const [query, setQuery] = useState("");
  const [dirty, setDirty] = useState(false);

  const agent = agents.find(a => a.id === selId) || agents[0];

  const update = (patch) => {
    setAgents(prev => prev.map(a => a.id === selId ? { ...a, ...patch } : a));
    setDirty(true);
  };
  const updateChannel = (k, patch) => {
    update({ channels: { ...agent.channels, [k]: { ...agent.channels[k], ...patch } } });
  };
  const updateRemote = (patch) => update({ remote: { ...agent.remote, ...patch } });
  const addAllow = (t) => update({ allow: [...new Set([...agent.allow, t])] });
  const remAllow = (t) => update({ allow: agent.allow.filter(x => x !== t) });
  const addDeny  = (t) => update({ deny:  [...new Set([...agent.deny, t])] });
  const remDeny  = (t) => update({ deny:  agent.deny.filter(x => x !== t) });

  return (
    <div className="layout">
      <AgentList agents={agents} selected={selId} onSelect={(id)=>{setSelId(id);setDirty(false);}}
                 query={query} setQuery={setQuery} />

      <main className="col-edit">
        <div className="edit-hd">
          <div className="glyph-lg">{agent.glyph}</div>
          <div>
            <h1 className="mono">{agent.name}</h1>
            <div className="breadcrumb">
              <a href="#">agents</a> <span>/</span>
              <a href="#">{agent.role}</a> <span>/</span>
              <span style={{color:"var(--text)"}}>{agent.name}</span>
            </div>
          </div>
          <div className="edit-hd-actions">
            <button className="btn btn-ghost btn-sm">Duplicate</button>
            <button className="btn btn-ghost btn-sm" style={{color:"var(--err)",borderColor:"rgba(226,109,109,0.25)"}}>Delete</button>
          </div>
        </div>

        <div className="edit-scroll scroll">

          {/* IDENTITY */}
          <section className="section">
            <div className="section-hd">
              <div className="section-hd-left">
                <span className="num">01</span>
                <span className="section-title">Identity</span>
              </div>
              <span className="section-hd-sub">how this agent is summoned and where it works</span>
            </div>
            <div className="field" style={{marginBottom:14}}>
              <label className="field-label">Name</label>
              <input className="input mono" value={agent.name} onChange={e=>update({name:e.target.value})} />
            </div>
            <div className="field" style={{marginBottom:14}}>
              <label className="field-label">System prompt</label>
              <textarea className="textarea" style={{minHeight:220}}
                        value={agent.prompt} onChange={e=>update({prompt:e.target.value})}></textarea>
              <div className="field-hint" style={{display:"flex",gap:14}}>
                <span>{agent.prompt.split(/\s+/).length} words · {agent.prompt.length} chars</span>
                <span style={{marginLeft:"auto",color:"var(--text-faint)"}} className="mono">markdown supported</span>
              </div>
            </div>
            <div className="field">
              <label className="field-label">Working directory</label>
              <div className="picker-input">
                <input className="input mono" value={agent.workdir} onChange={e=>update({workdir:e.target.value})} />
                <button className="pick-btn" title="Pick folder"><Icon k="folder" /></button>
              </div>
            </div>
          </section>

          {/* MODEL */}
          <section className="section">
            <div className="section-hd">
              <div className="section-hd-left">
                <span className="num">02</span>
                <span className="section-title">Model</span>
              </div>
              <span className="section-hd-sub">which Claude does the thinking</span>
            </div>
            <div className="grid-2">
              <div className="field">
                <label className="field-label">Model</label>
                <select className="select mono" value={agent.model} onChange={e=>update({model:e.target.value})}>
                  <option value="haiku">haiku — fast · cheap · 200k</option>
                  <option value="sonnet">sonnet — balanced · 1M</option>
                  <option value="opus">opus — deepest · 200k</option>
                  <option value="sonnet-thinking">sonnet-thinking — extended reasoning</option>
                </select>
              </div>
              <div className="field">
                <label className="field-label">Temperature</label>
                <select className="select mono" defaultValue="0.4">
                  <option>0.0 — deterministic</option>
                  <option>0.2</option>
                  <option>0.4</option>
                  <option>0.7</option>
                  <option>1.0 — creative</option>
                </select>
              </div>
            </div>
            <div className="row-toggle" style={{marginTop:14}}>
              <div className="rt-text">
                <div className="nm">Use plan max <Icon k="info" /></div>
                <div className="ds">Exploite ton abonnement Claude Code Max — appels facturés sur ton quota plan plutôt que par token.</div>
              </div>
              <Toggle on={agent.planMax} onChange={v=>update({planMax:v})} />
            </div>
          </section>

          {/* PERMISSIONS */}
          <section className="section">
            <div className="section-hd">
              <div className="section-hd-left">
                <span className="num">03</span>
                <span className="section-title">Permissions</span>
              </div>
              <span className="section-hd-sub">trust scope and allowed tool surface</span>
            </div>
            <div className="field" style={{marginBottom:16}}>
              <label className="field-label">Permission mode</label>
              <RadioGroup value={agent.permissions} options={["auto","acceptEdits","plan","bypassPermissions"]}
                          onChange={v=>update({permissions:v})} />
              <div className="field-hint">
                {{
                  auto:"agent acts freely within allowed tools",
                  acceptEdits:"agent applies edits without confirm but stops before destructive ops",
                  plan:"agent proposes a plan and waits for approval",
                  bypassPermissions:"agent acts on any tool — use only for trusted system agents"
                }[agent.permissions]}
              </div>
            </div>
            <div className="grid-2">
              <div className="field">
                <label className="field-label">Allowed tools · {agent.allow.length}</label>
                <div className="toolset"><ChipList items={agent.allow} kind="allow" onRemove={remAllow} onAdd={addAllow} /></div>
              </div>
              <div className="field">
                <label className="field-label">Denied tools · {agent.deny.length}</label>
                <div className="toolset"><ChipList items={agent.deny} kind="deny" onRemove={remDeny} onAdd={addDeny} /></div>
              </div>
            </div>
          </section>

          {/* CHANNELS */}
          <section className="section">
            <div className="section-hd">
              <div className="section-hd-left">
                <span className="num">04</span>
                <span className="section-title">Channels</span>
              </div>
              <span className="section-hd-sub">where this agent notifies + can be triggered</span>
            </div>
            <div className="channels">
              <ChannelCard id="telegram" name="Telegram" sub="DM via @MOSbot · 2-way"
                icon="telegram" on={agent.channels.telegram.on} value={agent.channels.telegram.v}
                valueLabel="chat_id" valuePh="@username or -100xxxx"
                onToggle={v=>updateChannel("telegram",{on:v})} onValue={v=>updateChannel("telegram",{v})} />
              <ChannelCard id="discord" name="Discord" sub="Webhook · push-only"
                icon="discord" on={agent.channels.discord.on} value={agent.channels.discord.v}
                valueLabel="webhook_url" valuePh="https://discord.com/api/webhooks/…"
                onToggle={v=>updateChannel("discord",{on:v})} onValue={v=>updateChannel("discord",{v})} />
              <ChannelCard id="whatsapp" name="WhatsApp" sub="Via Twilio · 2-way"
                icon="whatsapp" on={agent.channels.whatsapp.on} value={agent.channels.whatsapp.v}
                valueLabel="phone number" valuePh="+33 6 ..."
                onToggle={v=>updateChannel("whatsapp",{on:v})} onValue={v=>updateChannel("whatsapp",{v})} />
              <ChannelCard id="webhook" name="Webhook" sub="Custom HTTPS endpoint"
                icon="webhook" on={agent.channels.webhook.on} value={agent.channels.webhook.v}
                valueLabel="endpoint url" valuePh="https://your-app.dev/agent-hook"
                onToggle={v=>updateChannel("webhook",{on:v})} onValue={v=>updateChannel("webhook",{v})} />
            </div>
          </section>

          {/* REMOTE CONTROL */}
          <section className="section">
            <div className="section-hd">
              <div className="section-hd-left">
                <span className="num">05</span>
                <span className="section-title">Remote control</span>
              </div>
              <span className="section-hd-sub">pilot from claude.ai mobile</span>
            </div>
            <div className={"remote-card" + (agent.remote.on ? " on" : "")}>
              <div className="remote-hd">
                <div className="rh-ic"><Icon k="wifi" size={17} /></div>
                <div className="remote-meta">
                  <div className="nm">Enable remote control</div>
                  <div className="ds">Permet de piloter cet agent depuis Claude.ai mobile via un tunnel sécurisé chiffré bout-en-bout.</div>
                </div>
                <Toggle on={agent.remote.on} onChange={v=>updateRemote({on:v, url: v && !agent.remote.url ? `https://t-4f2a91.mos.tunnel/agent/${agent.id}?k=••••${Math.random().toString(36).slice(2,5)}` : agent.remote.url})} />
              </div>
              {agent.remote.on && (
                <div className="remote-body">
                  <div className="field">
                    <label className="field-label">Tunnel URL</label>
                    <div className="tunnel">
                      <Icon k="lock" />
                      <span className="url mono">{agent.remote.url}</span>
                      <span title="Copy URL"><Icon k="copy" /></span>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
                    <div className="qr"></div>
                    <div style={{flex:1,display:"flex",flexDirection:"column",gap:8}}>
                      <div className="field-hint">Scan with Claude mobile to pair instantly. Token rotates every 90 days.</div>
                      <div style={{display:"flex",gap:8}}>
                        <button className="btn btn-ghost btn-sm"><Icon k="refresh" size={12} />Regenerate token</button>
                        <button className="btn btn-sm" style={{color:"var(--err)"}}>Revoke</button>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </section>

        </div>

        {/* footer */}
        <div className="edit-footer">
          <button className={"btn btn-primary"} onClick={()=>setDirty(false)}>Save</button>
          <button className="btn btn-ghost">Test prompt</button>
          <div className={"save-status" + (dirty ? "" : " saved")}>
            <span className="d"></span>
            <span>{dirty ? "unsaved changes" : "all changes saved · 14:22"}</span>
          </div>
          <a className="open-chat" href={`Chat Agent.html?agent=${agent.id}`}>
            Open chat with <span className="mono" style={{marginLeft:4}}>{agent.name}</span>
            <Icon k="arrow" />
          </a>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
