  const out = [];
  let inCode=false, codeBuf=[];
  const inline = (s) => s
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/(?<!\*)\*([^*]+)\*(?!\*)/g,'<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');
  let list=null;
  const flushList = () => { if(list){ out.push("</"+list+">"); list=null; } };
  for(const raw of lines){
    if(raw.startsWith("```")){
      if(inCode){
        out.push('<pre>'+codeBuf.join("\n").replace(/&/g,"&amp;").replace(/</g,"&lt;")+'</pre>');
        codeBuf=[]; inCode=false;
      } else { flushList(); inCode=true; }
      continue;
    }
    if(inCode){ codeBuf.push(raw); continue; }
    if(/^#{3}\s/.test(raw)){ flushList(); out.push('<h3>'+inline(raw.replace(/^#{3}\s/,""))+'</h3>'); continue; }
    if(/^##\s/.test(raw)){   flushList(); out.push('<h2>'+inline(raw.replace(/^##\s/,""))+'</h2>'); continue; }
    if(/^#\s/.test(raw)){    flushList(); out.push('<h1>'+inline(raw.replace(/^#\s/,""))+'</h1>'); continue; }
    if(/^>\s?/.test(raw)){   flushList(); out.push('<blockquote>'+inline(raw.replace(/^>\s?/,""))+'</blockquote>'); continue; }
    if(/^\s*[-*]\s/.test(raw)){
      if(list !== "ul"){ flushList(); list="ul"; out.push("<ul>"); }
      out.push('<li>'+inline(raw.replace(/^\s*[-*]\s/,""))+'</li>'); continue;
    }
    if(/^\s*\d+\.\s/.test(raw)){
      if(list !== "ol"){ flushList(); list="ol"; out.push("<ol>"); }
      out.push('<li>'+inline(raw.replace(/^\s*\d+\.\s/,""))+'</li>'); continue;
    }
    if(raw.trim() === ""){ flushList(); continue; }
    if(/^---+$/.test(raw)){ flushList(); out.push("<hr/>"); continue; }
    flushList(); out.push('<p>'+inline(raw)+'</p>');
  }
  flushList();
  return out.join("\n");
}

// crude line diff
function diffLines(prev, cur){
  const a = prev.split("\n"), b = cur.split("\n");
  const setA = new Set(a), setB = new Set(b);
  const out = [];
  let i=0, j=0;
  while(i<a.length || j<b.length){
    if(i<a.length && j<b.length && a[i] === b[j]){ out.push({type:"eq", text:a[i]}); i++; j++; continue; }
    if(j<b.length && !setA.has(b[j])){ out.push({type:"add", text:b[j]}); j++; continue; }
    if(i<a.length && !setB.has(a[i])){ out.push({type:"del", text:a[i]}); i++; continue; }
    if(i<a.length){ out.push({type:"eq", text:a[i]}); i++; }
    if(j<b.length){ out.push({type:"eq", text:b[j]}); j++; }
  }
  return out;
}

function App(){
  const [agentId, setAgentId] = useState("forge");
  const files = FILES[agentId] || [];
  const [fileName, setFileName] = useState(files[0].name);
  const file = files.find(f => f.name === fileName) || files[0];
  const [body, setBody] = useState(file.body || "");
  const [view, setView] = useState("split"); // split | preview | raw
  const [showDiff, setShowDiff] = useState(false);
  const [savedAt, setSavedAt] = useState("just now");
  const [savingTimer, setSavingTimer] = useState(null);
  const [saving, setSaving] = useState(false);
  const taRef = useRef(null);

  useEffect(() => {
    setBody(file.body || "");
    setShowDiff(false);
    setSavedAt("loaded");
  }, [file.name, agentId]);

  // simulate auto-save
  useEffect(() => {
    if (savingTimer) clearTimeout(savingTimer);
    setSaving(true);
    const t = setTimeout(() => {
      setSaving(false);
      setSavedAt("saved just now");
    }, 1100);
    setSavingTimer(t);
    return () => clearTimeout(t);
  }, [body]);

  // age the savedAt label
  useEffect(() => {
    if (saving) return;
    let s = 1;
    const i = setInterval(() => {
      s++;
      if (s < 60) setSavedAt(`saved ${s}s ago`);
      else { setSavedAt("saved 1m ago"); clearInterval(i); }
    }, 1000);
    return () => clearInterval(i);
  }, [saving]);

  const wrap = (open, close=open) => {
    if (!taRef.current) return;
    const ta = taRef.current;
    const s = ta.selectionStart, e = ta.selectionEnd;
    const sel = body.slice(s,e) || "text";
    const next = body.slice(0,s) + open + sel + close + body.slice(e);
    setBody(next);
    setTimeout(() => { ta.focus(); ta.setSelectionRange(s+open.length, s+open.length+sel.length); }, 0);
  };
  const prefix = (p) => {
    if (!taRef.current) return;
    const ta = taRef.current;
    const s = ta.selectionStart;
    const lineStart = body.lastIndexOf("\n", s-1)+1;
    setBody(body.slice(0,lineStart) + p + body.slice(lineStart));
  };

  const tokens = Math.round((body.length || 0) / 3.6);
  const words  = body.trim() ? body.trim().split(/\s+/).length : 0;
  const totalTok = files.reduce((s,f) => s + f.tokens, 0);
  const cap = 200000;

  const prev = PREVIOUS[file.name];
  const diff = (showDiff && prev && file.kind === "md") ? diffLines(prev, body) : null;

  return (
    <div className="layout">
      <aside className="col-tree">
        <div className="tree-hd">
          <h2>Memory</h2>
          <div className="sub">Editable working memory for each agent. Auto-saved.</div>
          <div className="agent-pick">
            {AGENTS.map(a => (
              <div key={a.id} className={"row" + (a.id === agentId ? " on" : "")}
                   onClick={() => setAgentId(a.id)}>
                <div className="g">{a.glyph}</div>
                <span className="nm">{a.name}</span>
                <span className="ts">{(a.tokens/1000).toFixed(1)}k tok</span>
              </div>
            ))}
          </div>
        </div>
        <div className="tree-body scroll">
          <div className="tree-section">
            <div className="lbl"><span>~/.mos/memory/{agentId}/</span><span className="ct">{files.length}</span></div>
            {files.map(f => (
              <div key={f.name} className={"tree-file"+(f.name===fileName?" on":"")}
                   onClick={() => setFileName(f.name)}>
                <span className="ic"><Icon k={f.kind==="jsonl"?"jsonl":"md"} /></span>
                <span className="nm">{f.name}</span>
                {f.dirty && <span className="dot" title="unsaved changes upstream"></span>}
                <span className="sz">{f.size}</span>
              </div>
            ))}
            <div className="add-file"><Icon k="plus" size={12}/>new memory file…</div>
          </div>
        </div>
        <div className="tree-foot">
          <div className="mem-meter">
            <div className="row"><span>memory · {agentId}</span><span className="v">{(totalTok/1000).toFixed(1)}k / 200k</span></div>
            <div className="mem-bar"><div className="fill" style={{width: Math.min(100, totalTok/cap*100)+"%"}}></div></div>
            <div className="hint">{Math.round(totalTok/cap*100)}% of context budget · compaction recommended above 70%</div>
          </div>
        </div>
      </aside>

      <main className="col-edit">
        <div className="editor-hd">
          <div className="breadcrumb">
            <a>memory</a><span className="sep">/</span>
            <a>{agentId}</a><span className="sep">/</span>
            <span className="cur">{file.name}</span>
          </div>
          <div className="editor-hd-actions">
            <div className={"save-pill" + (saving?" saving":"")}><span className="d"></span><span>{saving?"saving…":savedAt}</span></div>
            <button className="btn btn-ghost btn-sm"><Icon k="history" size={12}/>History</button>
          </div>
        </div>

        {file.kind === "md" ? (
          <>
            <div className="editor-toolbar">
              <button className="tb-btn" onClick={()=>prefix("# ")}  title="Heading 1"><Icon k="h1" size={14}/></button>
              <button className="tb-btn" onClick={()=>wrap("**")}    title="Bold"><Icon k="bold" size={14}/></button>
              <button className="tb-btn" onClick={()=>wrap("*")}     title="Italic"><Icon k="italic" size={14}/></button>
              <span className="tb-sep"></span>
              <button className="tb-btn" onClick={()=>wrap("[","](url)")} title="Link"><Icon k="link" size={14}/></button>
              <button className="tb-btn" onClick={()=>wrap("`")}     title="Inline code"><Icon k="code" size={14}/></button>
              <button className="tb-btn" onClick={()=>prefix("- ")}  title="List"><Icon k="list" size={14}/></button>
              <button className="tb-btn" onClick={()=>prefix("> ")}  title="Quote"><Icon k="quote" size={14}/></button>
              <span className="tb-spacer"></span>
              {prev && (
                <span className="tb-tab" onClick={()=>setShowDiff(d=>!d)} style={showDiff?{background:"var(--bg-elev-2)",color:"var(--accent)"}:{}}>
                  <Icon k="diff" size={12}/>show changes
                </span>
              )}
              <span className="tb-sep"></span>
              <span className={"tb-tab"+(view==="split"?" on":"")}   onClick={()=>setView("split")}><span className="d"></span>split</span>
              <span className={"tb-tab"+(view==="raw"?" on":"")}     onClick={()=>setView("raw")}>raw</span>
              <span className={"tb-tab"+(view==="preview"?" on":"")} onClick={()=>setView("preview")}>preview</span>
            </div>

            <div className={"editor-body" + (view!=="split"?" single":"") + (showDiff&&prev?" diff":"")}>
              {(view==="split" || view==="raw") && (
                <div className="pane raw">
                  <textarea ref={taRef} className={"raw-area scroll" + (showDiff&&prev?" diff-on":"")}
                            value={body} onChange={e=>setBody(e.target.value)} spellCheck="false"></textarea>
                  {showDiff && prev && (
                    <div className="diff-view scroll">
                      {diff.map((l,i) => (
                        <div key={i} className={"diff-line "+l.type}>
                          <span className="pf">{l.type==="add"?"+":l.type==="del"?"−":" "}</span>{l.text || " "}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
              {(view==="split" || view==="preview") && (
                <div className="pane preview scroll" dangerouslySetInnerHTML={{__html: renderMarkdown(body)}}></div>
              )}
            </div>
          </>
        ) : (
          <div className="editor-body single">
            <div className="pane scroll jsonl-preview">
              <div style={{color:"var(--text-faint)",marginBottom:12,fontSize:11.5}}>{LOG_EVENTS.length} of 4,128 events · read-only · rotated daily</div>
              {LOG_EVENTS.map((ev,i) => (
                <div key={i} className="ev">
                  <div className="hd">
                    <span className="ts">{ev.ts}</span>
                    <span className="ty">{ev.ty}</span>
                  </div>
                  <span>{"{ "}</span>
                  {Object.entries(ev.data).map(([k,v],j,arr) => (
                    <span key={k}>
                      <span className="key">"{k}"</span>: <span className={typeof v==="number"?"num":"str"}>{typeof v==="string"?`"${v}"`:JSON.stringify(v)}</span>{j<arr.length-1?", ":""}
                    </span>
                  ))}
                  <span>{" }"}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        <div className="editor-foot">
          <div className="foot-stat"><span className="k">words</span><span className="v">{words.toLocaleString()}</span></div>
          <div className="foot-stat"><span className="k">tokens</span><span className="v">~{tokens.toLocaleString()}</span></div>
          <div className="foot-stat"><span className="k">size</span><span className="v">{file.size}</span></div>
          <div className="foot-spacer"></div>
          <div className="foot-stat" style={{color:"var(--text-faint)"}}>compaction reduces this file by ~60% while preserving decisions</div>
          <button className="btn btn-ghost btn-sm"><Icon k="compact" size={12}/>Compact</button>
          <button className="btn btn-primary btn-sm"><Icon k="save" size={12}/>Save now</button>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
